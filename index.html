<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>End-Time Message Tube | Ultimate Archive</title>
    <style>
        :root { --bg: #050505; --gold: #d4af37; --red: #ff0000; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 260px; background: #000; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .logo { color: var(--red); font-size: 1.5rem; font-weight: 900; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .nav { color: #888; cursor: pointer; padding: 12px; border-radius: 5px; margin-bottom: 5px; transition: 0.3s; }
        .nav:hover, .nav.active { background: #222; color: #fff; }
        main { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(180deg, #0a0a0a, #050505); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #111; position: relative; display: flex; align-items: center; justify-content: center; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .play-btn { position: relative; z-index: 2; font-size: 3rem; opacity: 0.8; text-shadow: 0 0 10px black; }
        .info { padding: 15px; }
        .tag { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .v-title { font-size: 1rem; margin: 8px 0; font-weight: 600; line-height: 1.3; }
        #playerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 999; align-items: center; justify-content: center; }
        .player-content { width: 90%; max-width: 1000px; position: relative; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close { position: absolute; top: -50px; right: 0; color: white; font-size: 1.5rem; cursor: pointer; background: #333; border: none; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">ETM TUBE</div>
        <div class="nav active" onclick="show('all')">Full Library</div>
        <div class="nav" onclick="show('sermon')">Prophetic Sermons</div>
        <div class="nav" onclick="show('testimony')">Testimonies</div>
        <div class="nav" onclick="show('music')">Message Music</div>
        <div class="nav" onclick="show('history')">History & Art</div>
    </aside>
    <main>
        <div class="grid" id="mainGrid"></div>
    </main>
    <div id="playerModal">
        <div class="player-content">
            <button class="close" onclick="closeV()">✕ CLOSE PLAYER</button>
            <div class="video-box" id="vidFrame"></div>
            <h2 id="vidTitle" style="margin-top:20px; color:var(--gold); font-size: 1.2rem;"></h2>
        </div>
    </div>
<script>
    const db = [
        { cat: 'sermon', id: 'qY_3T-p0N0s', title: 'Deep Calleth to the Deep (1954)' },
        { cat: 'sermon', id: 'FstjV8Q_8a8', title: '20th Century Prophet Documentary' },
        { cat: 'sermon', id: 'xHq3M5C9vP8', title: 'The Pillar of Fire (1950 Witness)' },
        { cat: 'testimony', id: 'nFmF1mUAn1k', title: 'Modern Testimonies of Healing' },
        { cat: 'testimony', id: 'L9YhBqV7-V4', title: 'Interview with Pearry Green' },
        { cat: 'music', id: '8fL-WwV9XkY', title: 'Only Believe (Original Recording)' },
        { cat: 'music', id: 'v_7rP0eO_L8', title: 'Hymns of the Message Hour' },
        { cat: 'history', id: 'T8Y-HlM8l0E', title: 'The 1963 Sunset Cloud History' }
    ];

    function show(filter) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        const filtered = filter === 'all' ? db : db.filter(x => x.cat === filter);
        filtered.forEach(v => {
            const thumbUrl = `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`;
            grid.innerHTML += `
            <div class="card" onclick="openV('${v.id}', '${v.title.replace(/'/g, "\\'")}')">
                <div class="thumb-container">
                    <img src="${thumbUrl}" onerror="this.style.display='none'">
                    <div class="play-btn">▶</div>
                </div>
                <div class="info">
                    <div class="tag">${v.cat}</div>
                    <div class="v-title">${v.title}</div>
                </div>
            </div>`;
        });
    }

    function openV(id, title) {
        document.getElementById('playerModal').style.display = 'flex';
        document.getElementById('vidFrame').innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        document.getElementById('vidTitle').innerText = title;
    }

    function closeV() {
        document.getElementById('playerModal').style.display = 'none';
        document.getElementById('vidFrame').innerHTML = '';
    }

    window.onload = () => show('all');
</script>
</body>
</html>
