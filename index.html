<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End-Time Message Tube | Mega-Archive v5</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #121212;
            --accent: #ff0000;
            --gold: #c5a059;
            --text: #e0e0e0;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Navigation */
        aside { width: var(--sidebar-w); background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; }
        .logo-area { padding: 30px 20px; font-weight: 900; font-size: 1.4rem; color: var(--accent); border-bottom: 1px solid #111; }
        .nav-group { padding: 20px 0; }
        .nav-label { font-size: 0.7rem; color: #555; text-transform: uppercase; padding: 10px 25px; letter-spacing: 1px; }
        .nav-item { padding: 12px 25px; cursor: pointer; color: #aaa; transition: 0.2s; display: flex; align-items: center; }
        .nav-item:hover { background: #111; color: #fff; }
        .nav-item.active { background: #1a1a1a; color: var(--gold); border-left: 4px solid var(--gold); }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 40px; background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .search-container { background: #111; border: 1px solid #333; padding: 10px 20px; border-radius: 50px; width: 50%; }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        .section-title { font-size: 1.8rem; margin-bottom: 30px; color: var(--gold); display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ""; height: 2px; flex: 1; background: #222; }

        /* Grids */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-bottom: 60px; }

        /* Resource Card */
        .res-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; transition: 0.4s; border: 1px solid #1a1a1a; }
        .res-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        .res-thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; cursor: pointer; overflow: hidden; }
        .res-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .res-card:hover .res-thumb img { transform: scale(1.1); filter: brightness(0.6); }
        .play-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 3rem; opacity: 0; transition: 0.3s; }
        .res-card:hover .play-hint { opacity: 1; }

        .res-info { padding: 20px; }
        .res-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; background: #222; color: #888; }
        .res-title { font-size: 1.1rem; font-weight: 600; line-height: 1.4; color: #fff; margin-bottom: 10px; }
        .res-desc { font-size: 0.85rem; color: #777; line-height: 1.5; }

        /* Video Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; }
        .modal-container { width: 90%; max-width: 1100px; }
        .video-player { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; box-shadow: 0 0 100px rgba(0,0,0,1); }
        .video-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 40px; right: 40px; color: #fff; font-size: 3rem; cursor: pointer; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
<body>

    <aside>
        <div class="logo-area">ETM TUBE <small style="font-size:0.6rem; color:#555">v5.0</small></div>
        
        <div class="nav-group">
            <div class="nav-label">Archive</div>
            <div class="nav-item active" onclick="filterMedia('all')">Everything</div>
            <div class="nav-item" onclick="filterMedia('video')">Classic Sermons</div>
            <div class="nav-item" onclick="filterMedia('doc')">The Written Word</div>
            <div class="nav-item" onclick="filterMedia('art')">History & Art</div>
            <div class="nav-item" onclick="filterMedia('testimony')">Testimonies</div>
            <div class="nav-item" onclick="filterMedia('music')">Message Music</div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Study Topics</div>
            <div class="nav-item">The Seven Seals</div>
            <div class="nav-item">Church Ages</div>
            <div class="nav-item">The Supernatural</div>
        </div>
    </aside>

    <main>
        <div class="header">
            <div class="section-title" id="pageTitle">Comprehensive Archive</div>
            <div class="search-container">
                <input type="text" placeholder="Search thousands of sermons and resources...">
            </div>
        </div>

        <div class="grid" id="mainGrid"></div>
    </main>

    <div id="modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <div class="modal-container">
            <div class="video-player" id="playerBox"></div>
            <h2 id="modalTitle" style="margin-top:20px; color:var(--gold)"></h2>
        </div>
    </div>

<script>
    // A massive dataset covering all requested types
    const database = [
        // VIDEOS
        { type: 'video', tag: 'Sermon', id: 'qY_3T-p0N0s', title: 'Deep Calleth to the Deep', desc: 'The 1954 classic in Washington D.C., showing the supernatural discernment.', img: 'https://img.youtube.com/vi/qY_3T-p0N0s/maxresdefault.jpg' },
        { type: 'video', tag: 'History', id: 'FstjV8Q_8a8', title: '20th Century Prophet', desc: 'Historical documentary detailing the life and ministry of Brother Branham.', img: 'https://img.youtube.com/vi/FstjV8Q_8a8/hqdefault.jpg' },
        { type: 'video', tag: 'Supernatural', id: 'xHq3M5C9vP8', title: 'The Pillar of Fire Witness', desc: 'The story behind the 1950 photograph in Houston, Texas.', img: 'https://img.youtube.com/vi/xHq3M5C9vP8/hqdefault.jpg' },
        { type: 'video', tag: 'Doctrine', id: '5S5fXz7W1YI', title: 'The Seven Seals Introduction', desc: 'Understanding the revelation of 1963.', img: 'https://img.youtube.com/vi/5S5fXz7W1YI/hqdefault.jpg' },
        
        // THIRD PARTY / TESTIMONIES
        { type: 'testimony', tag: 'Testimony', id: 'nFmF1mUAn1k', title: 'Miraculous Healings', desc: 'A collection of modern day testimonies of people healed in the ministry.', img: 'https://img.youtube.com/vi/nFmF1mUAn1k/hqdefault.jpg' },
        { type: 'video', tag: 'Interview', id: 'L9YhBqV7-V4', title: 'Pearry Green Interview', desc: 'Personal accounts of life with the prophet.', img: 'https://img.youtube.com/vi/L9YhBqV7-V4/hqdefault.jpg' },
        
        // MUSIC
        { type: 'music', tag: 'Worship', id: '8fL-WwV9XkY', title: 'Only Believe (Original)', desc: 'The theme song of the Branham campaigns.', img: 'https://img.youtube.com/vi/8fL-WwV9XkY/hqdefault.jpg' },
        { type: 'music', tag: 'Hymn', id: 'v_7rP0eO_L8', title: 'Message Worship Collection', desc: 'Songs and hymns played during the services.', img: 'https://img.youtube.com/vi/v_7rP0eO_L8/hqdefault.jpg' },

        // DOCUMENTS / ART (Using placeholders or direct links)
        { type: 'doc', tag: 'Book', title: 'The Revelation of the Seven Seals', desc: 'The full PDF/Text exposition of the seals.', img: 'https://branham.org/images/logo-footer.png' },
        { type: 'doc', tag: 'Sermon', title: 'The Seven Church Ages', desc: 'Complete book on the church ages history.', img: 'https://branham.org/images/logo-footer.png' },
        { type: 'art', tag: 'Photo', title: 'The 1963 Cloud', desc: 'A supernatural cloud that appeared over Tucson.', img: 'https://branham.org/images/supernatural/TheCloud.jpg' },
        { type: 'art', tag: 'Photo', title: 'The Pillar of Fire', desc: 'The Houston photograph from Jan 24, 1950.', img: 'https://branham.org/images/supernatural/PillarOfFire.jpg' }
    ];

    function render(filter = 'all') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        
        const items = filter === 'all' ? database : database.filter(i => i.type === filter);
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'res-card';
            
            // If it's a video/music/testimony, it uses a player
            const isPlayable = ['video', 'music', 'testimony'].includes(item.type);
            const clickAction = isPlayable ? `openPlayer('${item.id}', '${item.title.replace(/'/g, "\'")}')` : `window.open('https://branham.org', '_blank')`;

            card.innerHTML = `
                <div class="res-thumb" onclick="${clickAction}">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x225/111/444?text=Message+Resource'">
                    ${isPlayable ? '<div class="play-hint">▶</div>' : ''}
                </div>
                <div class="res-info">
                    <span class="res-tag">${item.tag}</span>
                    <div class="res-title">${item.title}</div>
                    <div class="res-desc">${item.desc}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function openPlayer(id, title) {
        const modal = document.getElementById('modal');
        const box = document.getElementById('playerBox');
        // Using a more aggressive YouTube embed fix
        box.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1" 
                        allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
        document.getElementById('modalTitle').innerText = title;
        modal.style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('playerBox').innerHTML = '';
    }

    function filterMedia(type) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('pageTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1) + " Resources";
        render(type);
    }

    window.onload = () => render();
</script>
</body>
</html>
